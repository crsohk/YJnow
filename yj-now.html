<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YJ NOW</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:      #000000;
      --surface: rgba(255,255,255,0.06);
      --border:  rgba(255,255,255,0.09);
      --accent:  #6366f1;
      --a2:      #818cf8;
      --green:   #30d158;
      --text:    #ffffff;
      --muted:   rgba(255,255,255,0.4);
      --sec:     rgba(255,255,255,0.65);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      /* SF Pro — best iOS font, falls back gracefully */
      font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Background glow ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 35% at 50% 0%, rgba(99,102,241,0.14) 0%, transparent 65%),
        radial-gradient(ellipse 40% 25% at 80% 100%, rgba(129,140,248,0.07) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── App shell ── */
    .app {
      position: relative; z-index: 1;
      height: 100dvh;
      max-width: 390px;
      margin: 0 auto;
      display: flex; flex-direction: column;
      padding-top:    env(safe-area-inset-top,    44px);
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    /* ═══════════════════════════════
       TOP BAR
    ═══════════════════════════════ */
    .top-bar {
      flex-shrink: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 22px 4px;
    }

    .logo { display: flex; align-items: center; gap: 6px; }
    .logo-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent), 0 0 20px rgba(99,102,241,.3);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.65)} }
    .logo-text {
      font-size: 11px; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase; color: var(--a2);
    }
    .live-badge {
      display: flex; align-items: center; gap: 4px;
      background: rgba(48,209,88,.1); border: 1px solid rgba(48,209,88,.22);
      border-radius: 100px; padding: 3px 9px;
      font-size: 10px; font-weight: 600; color: var(--green); letter-spacing: .08em;
    }
    .live-dot {
      width: 5px; height: 5px; border-radius: 50%; background: var(--green);
      animation: blink 1.4s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }


    /* ═══════════════════════════════
       HERO  — 지금 진행 중 (BIGGEST)
    ═══════════════════════════════ */
    .hero {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: 10px 28px 4px;
    }

    .hero-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: .2em; text-transform: uppercase; color: var(--a2);
      margin-bottom: 6px;
    }

    .hero-emoji { font-size: 52px; line-height: 1; margin-bottom: 8px; }

    .hero-name {
      font-size: clamp(34px, 10vw, 46px);
      font-weight: 700; letter-spacing: -.03em; line-height: 1.05;
      color: #fff;
    }

    .hero-since {
      margin-top: 5px;
      font-size: 13px; color: var(--muted); font-weight: 400;
    }

    /* thin progress bar under hero */
    .hero-prog { width: 100%; max-width: 260px; margin-top: 12px; }
    .hp-meta {
      display: flex; justify-content: space-between;
      font-size: 10px; color: var(--muted); margin-bottom: 5px;
    }
    .hp-track { height: 2.5px; background: rgba(255,255,255,.08); border-radius: 100px; overflow: hidden; }
    .hp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--a2));
      border-radius: 100px; transition: width .6s ease;
    }


    /* ═══════════════════════════════
       CLOCK
    ═══════════════════════════════ */
    .clock-block {
      flex-shrink: 0;
      text-align: center;
      padding: 8px 22px 2px;
    }

    .clock-face {
      font-size: clamp(60px, 18vw, 78px);
      font-weight: 100; letter-spacing: -.04em; line-height: 1;
    }
    .clock-face .c { color: var(--a2); animation: blink 1s step-end infinite; }
    .clock-face .s {
      font-size: .27em; color: var(--muted); font-weight: 300;
      vertical-align: 0.1em;
    }

    .clock-meta {
      display: flex; justify-content: center; align-items: center; gap: 8px;
      margin-top: 3px; font-size: 12px; color: var(--muted);
    }
    .day-chip {
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.28);
      border-radius: 100px; padding: 2px 9px;
      font-size: 11px; font-weight: 600; color: var(--a2);
    }


    /* ═══════════════════════════════
       3-D DRUM DIAL
    ═══════════════════════════════ */
    .dial-section {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 0;
      padding: 2px 0 4px;
    }

    .dial-heading {
      font-size: 10px; font-weight: 600;
      letter-spacing: .15em; text-transform: uppercase;
      color: rgba(255,255,255,.18);
      margin-bottom: 8px;
    }

    /* Outer wrapper — clips side bleed & hosts the frame */
    .dial-outer {
      position: relative;
      width: 100%; display: flex; align-items: center; justify-content: center;
    }

    /* Left/right edge fade to simulate drum depth */
    .dial-outer::before, .dial-outer::after {
      content: ''; position: absolute; top: 0; bottom: 0;
      width: 90px; z-index: 3; pointer-events: none;
    }
    .dial-outer::before { left:  0; background: linear-gradient(to right, #000 0%, transparent 100%); }
    .dial-outer::after  { right: 0; background: linear-gradient(to left,  #000 0%, transparent 100%); }

    /* Selection highlight frame */
    .dial-frame {
      position: absolute; z-index: 2; pointer-events: none;
      width: 160px; height: 62px;
      border: 1px solid rgba(99,102,241,.35); border-radius: 14px;
      background: rgba(99,102,241,.05);
    }

    /* 3-D viewport — perspective source */
    .drum-vp {
      width: 360px; height: 72px;
      perspective: 520px;
      display: flex; align-items: center; justify-content: center;
      cursor: grab; user-select: none; -webkit-user-select: none;
      touch-action: none;
    }
    .drum-vp:active { cursor: grabbing; }

    /* The rotating stage */
    .drum-stage {
      width: 155px; height: 64px;
      transform-style: preserve-3d;
      position: relative;
      will-change: transform;
    }

    /* Individual drum items */
    .drum-item {
      position: absolute; top: 0; left: 0;
      width: 155px; height: 64px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      will-change: opacity;
    }

    .di-icon { font-size: 15px; line-height: 1; }
    .di-name {
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,.82);
      white-space: nowrap; max-width: 145px;
      overflow: hidden; text-overflow: ellipsis; text-align: center;
      transition: color .15s, font-weight .15s;
    }
    .di-time {
      font-size: 10px; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .dial-hint {
      margin-top: 8px;
      font-size: 10px; color: rgba(255,255,255,.15);
    }


    /* ═══════════════════════════════
       WEATHER BAR
    ═══════════════════════════════ */
    .weather-bar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      margin: 4px 20px 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 10px 15px;
    }
    .wb-icon { font-size: 22px; }
    .wb-info { flex: 1; }
    .wb-desc { font-size: 12px; color: var(--sec); }
    .wb-loc  { font-size: 10px; color: var(--muted); }
    .wb-temp { font-size: 22px; font-weight: 200; color: var(--text); font-variant-numeric: tabular-nums; }
    .wb-extras { display: flex; gap: 10px; }
    .wb-e { display: flex; flex-direction: column; align-items: flex-end; }
    .wb-e .v { font-size: 11px; font-weight: 600; color: var(--sec); }
    .wb-e .k { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">YJ NOW</span>
    </div>
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>

  <!-- HERO -->

    <div class="hero-label">지금 진행 중</div>
    <div class="hero-emoji" id="curr-icon">📚</div>
    <div class="hero-name"  id="curr-name">로딩 중</div>

      </div>

        <div class="hp-fill" id="hp-fill" style="width:0%"></div>

    </div>

    <div class="wb-info">
      <div class="wb-desc" id="wb-desc">불러오는 중...</div>
      <div class="wb-loc">📍 성남시 분당구</div>
    </div>
    <span class="wb-temp" id="wb-temp">--°</span>
    <div class="wb-extras">
      <div class="wb-e"><span class="v" id="wb-feels">--°</span><span class="k">체감</span></div>
      <div class="wb-e"><span class="v" id="wb-humid">--%</span><span class="k">습도</span></div>
    </div>
  </div>

</div><!-- .app -->

<script>
/* ════════════════════════════
   SCHEDULE DATA
════════════════════════════ */
const RAW = [
  "7:20,셔틀 대기,월요일","7:30,등교(셔틀),월요일","8:40,1교시 시작,월요일","9:40,2교시,월요일","10:40,3교시,월요일","11:30,중식(급식),월요일","12:40,4교시,월요일","13:40,5교시,월요일","14:40,6교시,월요일","15:30,7교시,월요일","16:30,종례/청소,월요일","16:40,방과후학교,월요일","17:30,석식,월요일","18:00,야간자습,월요일","21:00,야간자습,월요일","22:00,귀가(셔틀),월요일",
  "7:20,셔틀 대기,화요일","7:30,등교(셔틀),화요일","8:40,1교시 시작,화요일","9:40,2교시,화요일","10:40,3교시,화요일","11:30,중식(급식),화요일","12:40,4교시,화요일","13:40,5교시,화요일","14:40,6교시,화요일","15:30,7교시,화요일","16:30,종례/청소,화요일","16:40,귀가(셔틀),화요일","17:30,집,화요일","18:00,수학(베스),화요일","21:00,수학(베스),화요일","22:00,귀가(도보),화요일",
  "7:20,셔틀 대기,수요일","7:30,등교(셔틀),수요일","8:40,1교시 시작,수요일","9:40,2교시,수요일","10:40,3교시,수요일","11:30,중식(급식),수요일","12:40,4교시,수요일","13:40,5교시,수요일","14:40,6교시 종료,수요일","15:30,귀가(엄마셔틀),수요일","16:30,집,수요일","16:40,집,수요일","17:30,집,수요일","18:00,영어(테스),수요일","21:00,귀가(도보),수요일","22:00,집,수요일",
  "7:20,셔틀 대기,목요일","7:30,등교(셔틀),목요일","8:40,1교시 시작,목요일","9:40,2교시,목요일","10:40,3교시,목요일","11:30,중식(급식),목요일","12:40,4교시,목요일","13:40,5교시,목요일","14:40,6교시,목요일","15:30,7교시,목요일","16:30,종례/청소,목요일","16:40,방과후학교,목요일","17:30,석식,목요일","18:00,야간자습,목요일","21:00,야간자습,목요일","22:00,귀가(셔틀),목요일",
  "7:20,셔틀 대기,금요일","7:30,등교(셔틀),금요일","8:40,1교시 시작,금요일","9:40,2교시,금요일","10:40,3교시,금요일","11:30,중식(급식),금요일","12:40,4교시,금요일","13:40,5교시,금요일","14:40,6교시,금요일","15:30,7교시,금요일","16:30,종례/청소,금요일","16:40,귀가(셔틀),금요일","17:30,집,금요일","18:00,수학(베스),금요일","21:00,수학(베스),금요일","22:00,귀가(도보),금요일",
  "7:20,집,토요일","7:30,집,토요일","8:40,집,토요일","9:40,수학(베스),토요일","13:40,귀가(도보),토요일","14:40,집,토요일","22:00,집,토요일",
  "7:20,집,일요일","7:30,집,일요일","8:40,집,일요일","9:40,국어(배지희),일요일","13:40,귀가(버스),일요일","14:40,집,일요일","22:00,집,일요일"
];

const DAYS  = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
const DAY_S = ['일','월','화','수','목','금','토'];

function pad(n) { return String(n).padStart(2,'0'); }
function toMin(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }

function actIcon(name) {
  if (!name) return '💤';
  if (name.includes('셔틀') || name.includes('등교') || name.includes('귀가')) return '🚌';
  if (name.includes('교시')) return '📚';
  if (name.includes('중식') || name.includes('석식')) return '🍱';
  if (name.includes('청소') || name.includes('종례')) return '🧹';
  if (name.includes('방과후')) return '📖';
  if (name.includes('자습')) return '🌙';
  if (name.includes('수학')) return '🔢';
  if (name.includes('영어')) return '🌍';
  if (name.includes('국어')) return '📝';
  if (name.includes('집')) return '🏠';
  return '📌';
}


/* ════════════════════════════
   3-D DRUM LOGIC
   Items sit on a cylinder around the Y-axis.
   Drum stage rotates to bring selected item to front.
   - Item i placed at: rotateY(i × STEP°) translateZ(R px)
   - Stage rotated at: rotateY(−selected × STEP°)
   - Effective world angle of item i = (−sel × STEP) + (i × STEP)
     → = (i − sel) × STEP  → 0 when i == sel  ✓
════════════════════════════ */
const STEP = 30;   // degrees between items
const R    = 115;  // cylinder radius (px)

let items    = [];   // today's schedule
let selIdx   = 0;   // index of item facing front
let drumRot  = 0;   // current stage rotation (deg)
let dragging = false;
let dragX0   = 0;
let dragRot0 = 0;

/* Build all drum-item elements (called once per day-change) */
function buildDrum() {
  const stage = document.getElementById('drum-stage');
  stage.innerHTML = '';

  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'drum-item';
    el.innerHTML =
      `<div class="di-icon">${actIcon(item.activity)}</div>` +
      `<div class="di-name">${item.activity}</div>` +
      `<div class="di-time">${item.time}</div>`;
    // Fixed position on cylinder — never changes
    el.style.transform = `rotateY(${i * STEP}deg) translateZ(${R}px)`;
    stage.appendChild(el);
  });

  applyDrumVis();
}

/* Rotate the stage to a given angle, with optional smooth transition */
function rotateTo(deg, snap) {
  const stage = document.getElementById('drum-stage');
  stage.style.transition = snap ? 'transform .32s cubic-bezier(.25,.8,.25,1)' : 'none';
  stage.style.transform  = `rotateY(${deg}deg)`;
  drumRot = deg;
  applyDrumVis();
}

/* Update opacity / color of each item based on world-space angle */
function applyDrumVis() {
  document.querySelectorAll('.drum-item').forEach((el, i) => {
    // World Y-angle of this item
    const world = drumRot + i * STEP;
    // Normalise to −180 … +180
    const norm  = ((world % 360) + 540) % 360 - 180;
    const abs   = Math.abs(norm);

    // Fade out items beyond ±82°
    el.style.opacity = abs > 82
      ? '0'
      : String(+(1 - (abs / 82) * 0.82).toFixed(3));

    const dn = el.querySelector('.di-name');
    if (dn) {
      if (abs < 10) {
        dn.style.color = '#818cf8';
        dn.style.fontWeight = '700';
      } else {
        dn.style.color = 'rgba(255,255,255,.78)';
        dn.style.fontWeight = '500';
      }
    }
  });
}

/* Snap to the nearest item after drag ends */
function snapNearest() {
  const nearest = Math.round(-drumRot / STEP);
  selIdx = Math.max(0, Math.min(items.length - 1, nearest));
  rotateTo(-selIdx * STEP, true);
}

/* ── Touch / Mouse handlers ── */
const vp = document.getElementById('drum-vp');

vp.addEventListener('touchstart', e => {
  dragging = true;
  dragX0   = e.touches[0].clientX;
  dragRot0 = drumRot;
}, { passive: true });

vp.addEventListener('touchmove', e => {
  if (!dragging) return;
  e.preventDefault();
  const dx  = e.touches[0].clientX - dragX0;
  const min = -(items.length - 1) * STEP;
  rotateTo(Math.max(min, Math.min(0, dragRot0 + dx * 0.5)), false);
}, { passive: false });

vp.addEventListener('touchend', () => { if (dragging) { dragging = false; snapNearest(); } });

vp.addEventListener('mousedown', e => {
  dragging = true;
  dragX0   = e.clientX;
  dragRot0 = drumRot;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx  = e.clientX - dragX0;
  const min = -(items.length - 1) * STEP;
  rotateTo(Math.max(min, Math.min(0, dragRot0 + dx * 0.5)), false);
});
window.addEventListener('mouseup', () => { if (dragging) { dragging = false; snapNearest(); } });


/* ════════════════════════════
   SCHEDULE UPDATE
════════════════════════════ */
function updateSchedule() {
  const now    = new Date();
  const dayName = DAYS[now.getDay()];
  const nowMin  = now.getHours() * 60 + now.getMinutes();

  const fresh = RAW
    .filter(r => r.endsWith(dayName))
    .map(r => { const [t, a] = r.split(','); return { time: t, activity: a, min: toMin(t) }; });

  // Rebuild drum only when items list changes (day change)
  const rebuild = fresh.length !== items.length ||
    fresh.some((it, i) => items[i] && it.activity !== items[i].activity);
  items = fresh;

  // Find current index
  let ci = -1;
  for (let i = 0; i < items.length; i++) if (nowMin >= items[i].min) ci = i;

  const curr = ci >= 0                  ? items[ci]     : null;
  const next = ci < items.length - 1   ? items[ci + 1] : null;

  /* Hero */
  document.getElementById('curr-icon').textContent  = actIcon(curr?.activity);
  document.getElementById('curr-name').textContent  = curr ? curr.activity : '일정 없음';
  document.getElementById('curr-since').textContent = curr ? curr.time + ' 시작' : '--:--';

  /* Hero progress bar */
  let pct = 0;
  if (curr && next) {
    const tot = next.min - curr.min;
    if (tot > 0) pct = Math.min(100, Math.round((nowMin - curr.min) / tot * 100));
  }
  document.getElementById('hp-from').textContent  = curr ? curr.time : '-';
  document.getElementById('hp-to').textContent    = next ? '▶ ' + next.time : '-';
  document.getElementById('hp-pct').textContent   = pct + '%';
  document.getElementById('hp-fill').style.width  = pct + '%';

  /* Drum — center on current item if not being dragged */
  if (rebuild) {
    selIdx  = Math.max(0, ci);
    drumRot = -selIdx * STEP;
    buildDrum();
  } else if (!dragging) {
    selIdx  = Math.max(0, ci);
    rotateTo(-selIdx * STEP, true);
  }
}


/* ════════════════════════════
   CLOCK
════════════════════════════ */
function updateClock() {
  const now = new Date();
  document.getElementById('hh').textContent       = pad(now.getHours());
  document.getElementById('mm').textContent       = pad(now.getMinutes());
  document.getElementById('ss').textContent       = pad(now.getSeconds());
  document.getElementById('date-str').textContent =
    `${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())}`;
  document.getElementById('day-chip').textContent = DAY_S[now.getDay()] + '요일';
}


/* ════════════════════════════
   WEATHER  (성남시 분당구)
════════════════════════════ */
const W_ICONS = ['☀️','🌤️','⛅','☁️','🌫️','🌦️','🌧️','❄️','🌨️','⛈️'];
const W_DESCS = ['맑음','대체로 맑음','구름 조금','흐림','안개','이슬비','비','눈','눈 소나기','뇌우'];

function wIdx(c) {
  if (c===0) return 0; if (c<=2) return 1; if (c===3) return 3;
  if (c<=49) return 4; if (c<=57) return 5; if (c<=65) return 6;
  if (c<=77) return 7; if (c<=86) return 8; return 9;
}

async function fetchWeather() {
  try {
    const d = await (await fetch(
      'https://api.open-meteo.com/v1/forecast' +
      '?latitude=37.3595&longitude=127.1052' +
      '&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code' +
      '&timezone=Asia%2FSeoul'
    )).json();
    const c = d.current, wi = wIdx(c.weather_code);
    document.getElementById('wb-icon').textContent  = W_ICONS[wi];
    document.getElementById('wb-temp').textContent  = Math.round(c.temperature_2m) + '°';
    document.getElementById('wb-desc').textContent  = W_DESCS[wi];
    document.getElementById('wb-feels').textContent = Math.round(c.apparent_temperature) + '°';
    document.getElementById('wb-humid').textContent = c.relative_humidity_2m + '%';
  } catch {
    document.getElementById('wb-desc').textContent = '날씨 정보 없음';
  }
}


/* ════════════════════════════
   INIT
════════════════════════════ */
updateClock();
updateSchedule();
fetchWeather();

setInterval(updateClock,    1000);
setInterval(updateSchedule, 10000);
setInterval(fetchWeather,   600000);
</script>
