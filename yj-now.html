<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YJ NOW</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg: #000;
      --surf: rgba(255,255,255,0.06);
      --bord: rgba(255,255,255,0.12);
      --acc: #6366f1;
      --text: #fff;
      --muted: rgba(255,255,255,0.4);
    }
    body {
      height: 100vh; background: var(--bg);
      font-family: -apple-system, "SF Pro Display", sans-serif;
      color: var(--text); overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* 날씨 및 시간 상단 섹션 */
    .top-bar {
      position: absolute; top: 40px; text-align: center; width: 100%;
    }
    .top-bar h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }
    .weather { color: var(--muted); font-size: 1rem; margin-top: 5px; }

    /* 드럼 컨테이너: 시야를 더 넓게 확보 */
    .drum-viewport {
      perspective: 1200px; /* 원근감 완화 */
      width: 100%; height: 300px;
      display: flex; align-items: center; justify-content: center;
    }

    .drum-stage {
      width: 200px; height: 100px;
      transform-style: preserve-3d;
      position: relative;
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .drum-item {
      position: absolute; width: 200px; height: 100px;
      background: var(--surf); border: 1px solid var(--bord);
      border-radius: 20px; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      backface-visibility: hidden;
    }

    .di-icon { font-size: 2rem; margin-bottom: 8px; }
    .di-name { font-size: 1.2rem; font-weight: 700; }
    .di-time { font-size: 0.9rem; color: var(--acc); font-weight: 600; margin-top: 4px; }

    /* 현재 상태 강조 안내 */
    .now-indicator {
      position: absolute; bottom: 80px; color: var(--acc);
      font-weight: bold; font-size: 0.9rem; letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <h1 id="display-day">월요일</h1>
  <div class="weather" id="display-date">2026년 3월 16일</div>
</div>

<div class="drum-viewport">
  <div id="drum-stage" class="drum-stage"></div>
</div>

<div class="now-indicator">CURRENT SCHEDULE</div>

<script>
  // 교수님의 113줄 데이터를 기반으로 한 예시 데이터
  const rawData = [
    { time: "07:20", activity: "셔틀 대기", day: "월요일" },
    { time: "07:30", activity: "등교(셔틀)", day: "월요일" },
    { time: "08:40", activity: "1교시 시작", day: "월요일" },
    { time: "09:40", activity: "2교시", day: "월요일" },
    { time: "10:40", activity: "3교시", day: "월요일" },
    { time: "11:30", activity: "중식(급식)", day: "월요일" },
    { time: "12:40", activity: "4교시", day: "월요일" },
    { time: "13:40", activity: "5교시", day: "월요일" }
  ];

  /* 🛠️ 핵심 수정 수치 */
  const STEP = 90;  // 각도를 90도로 벌려 정면 외에는 완전히 측면으로 배치
  const R    = 250; // 반지름을 250으로 키워 공간을 아주 넓게 사용

  let items = [];
  let drumRot = 0;

  function init() {
    const now = new Date();
    const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
    const today = days[now.getDay()];
    
    document.getElementById('display-day').textContent = today;
    document.getElementById('display-date').textContent = now.toLocaleDateString();

    items = rawData.filter(d => d.day === today);
    buildDrum();
    scrollToCurrent();
  }

  function buildDrum() {
    const stage = document.getElementById('drum-stage');
    stage.innerHTML = '';
    items.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'drum-item';
      el.innerHTML = `
        <div class="di-icon">📅</div>
        <div class="di-name">${item.activity}</div>
        <div class="di-time">${item.time}</div>
      `;
      // 3D 배치: 회전각 i*STEP, 중심축에서의 거리 R
      el.style.transform = `rotateY(${i * STEP}deg) translateZ(${R}px)`;
      stage.appendChild(el);
    });
  }

  function scrollToCurrent() {
    const now = new Date();
    const curMin = now.getHours() * 60 + now.getMinutes();
    
    let targetIdx = 0;
    items.forEach((item, i) => {
      const [h, m] = item.time.split(':').map(Number);
      if (curMin >= h * 60 + m) targetIdx = i;
    });

    drumRot = -targetIdx * STEP;
    const stage = document.getElementById('drum-stage');
    stage.style.transform = `rotateY(${drumRot}deg)`;
    applyVis();
  }

  function applyVis() {
    document.querySelectorAll('.drum-item').forEach((el, i) => {
      const angle = (drumRot + i * STEP) % 360;
      const normAngle = Math.abs(((angle + 180) % 360) - 180);
      
      // 정면(0도 근처)만 선명하게, 나머지는 투명하게 처리하여 겹침 방지
      if (normAngle < 20) {
        el.style.opacity = "1";
        el.style.transform = `rotateY(${i * STEP}deg) translateZ(${R}px) scale(1.1)`;
      } else {
        el.style.opacity = "0.1";
        el.style.transform = `rotateY(${i * STEP}deg) translateZ(${R}px) scale(0.9)`;
      }
    });
  }

  window.onload = init;
</script>
</body>
</html>
