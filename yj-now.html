<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YJ NOW</title>

  <!-- ── PWA / 홈 화면 추가 ── -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="YJ NOW">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">

  <!-- 아이콘 SVG (인라인 base64) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%230d0d18'/%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='25%25' r='65%25'%3E%3Cstop offset='0%25' stop-color='%236366f1' stop-opacity='0.45'/%3E%3Cstop offset='100%25' stop-color='%230d0d18' stop-opacity='0'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='112' fill='url(%23g)'/%3E%3Ccircle cx='256' cy='96' r='18' fill='%236366f1' opacity='0.9'/%3E%3Ctext x='256' y='320' text-anchor='middle' font-family='SF Pro Display%2C -apple-system%2C sans-serif' font-weight='900' font-size='210' fill='white' letter-spacing='-6'%3EYJ%3C/text%3E%3Ctext x='256' y='410' text-anchor='middle' font-family='SF Pro Display%2C -apple-system%2C sans-serif' font-weight='700' font-size='82' fill='%23818cf8' letter-spacing='22'%3ENOW%3C/text%3E%3C/svg%3E">

  <!-- iOS 홈 화면 아이콘 (apple-touch-icon) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%230d0d18'/%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='25%25' r='65%25'%3E%3Cstop offset='0%25' stop-color='%236366f1' stop-opacity='0.45'/%3E%3Cstop offset='100%25' stop-color='%230d0d18' stop-opacity='0'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='512' height='512' fill='url(%23g)'/%3E%3Ccircle cx='256' cy='96' r='18' fill='%236366f1' opacity='0.9'/%3E%3Ctext x='256' y='320' text-anchor='middle' font-family='SF Pro Display%2C -apple-system%2C sans-serif' font-weight='900' font-size='210' fill='white' letter-spacing='-6'%3EYJ%3C/text%3E%3Ctext x='256' y='410' text-anchor='middle' font-family='SF Pro Display%2C -apple-system%2C sans-serif' font-weight='700' font-size='82' fill='%23818cf8' letter-spacing='22'%3ENOW%3C/text%3E%3C/svg%3E">
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg:     #000;
      --surf:   rgba(255,255,255,0.06);
      --bord:   rgba(255,255,255,0.09);
      --acc:    #6366f1;
      --a2:     #818cf8;
      --green:  #30d158;
      --text:   #fff;
      --muted:  rgba(255,255,255,0.4);
      --sec:    rgba(255,255,255,0.65);
    }
    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, "SF Pro Display", BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 65% 32% at 50% 0%,   rgba(99,102,241,.15) 0%, transparent 65%),
        radial-gradient(ellipse 40% 22% at 80% 100%, rgba(129,140,248,.07) 0%, transparent 60%);
    }

    /* ── SHELL ── */
    .app {
      position: relative; z-index: 1;
      height: 100dvh;
      max-width: 390px; margin: 0 auto;
      display: flex; flex-direction: column;
      padding-top:    env(safe-area-inset-top,    44px);
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    /* ═══════════════════════════
       1. TOP BAR
    ═══════════════════════════ */
    .top-bar {
      flex-shrink: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 22px 6px;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--acc);
      box-shadow: 0 0 10px var(--acc), 0 0 22px rgba(99,102,241,.35);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.65)} }
    .logo-text {
      font-size: 15px; font-weight: 800;
      letter-spacing: .2em; text-transform: uppercase; color: var(--a2);
    }
    .live-badge {
      display: flex; align-items: center; gap: 5px;
      background: rgba(48,209,88,.12); border: 1px solid rgba(48,209,88,.25);
      border-radius: 100px; padding: 5px 13px;
      font-size: 13px; font-weight: 700; color: var(--green); letter-spacing: .1em;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--green);
      animation: blink 1.4s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ═══════════════════════════
       2. HERO  — 지금 진행 중
    ═══════════════════════════ */
    .hero {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: 8px 28px 4px;
    }
    .hero-datetime {
      font-size: 16px; font-weight: 700;
      color: var(--muted); letter-spacing: .02em;
      margin-bottom: 6px; font-variant-numeric: tabular-nums;
    }
    .hero-datetime .hd-time {
      color: var(--a2); font-weight: 800; font-size: 19px;
    }
    .hero-emoji { font-size: 50px; line-height: 1; margin-bottom: 8px; }
    .hero-name {
      font-size: clamp(40px, 11vw, 54px);
      font-weight: 800; letter-spacing: -.03em; line-height: 1.05; color: #fff;
    }
    .hero-since {
      margin-top: 5px; font-size: 13px; color: var(--muted); font-weight: 400;
    }
    .hero-prog { width: 100%; max-width: 270px; margin-top: 12px; }
    .hp-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-bottom: 5px; }
    .hp-track { height: 2.5px; background: rgba(255,255,255,.08); border-radius: 100px; overflow: hidden; }
    .hp-fill  { height: 100%; background: linear-gradient(90deg, var(--acc), var(--a2)); border-radius: 100px; transition: width .6s; }

    /* ═══════════════════════════
       3. CLOCK — 제거됨 (hero-datetime으로 통합)
    ═══════════════════════════ */

    /* ═══════════════════════════
       4+5. WEATHER + BIORHYTHM (한 줄)
    ═══════════════════════════ */
    .wb-bio-wrap {
      flex-shrink: 0;
      display: flex; align-items: stretch;
      margin: 8px 20px 0;
      background: var(--surf); border: 1px solid var(--bord);
      border-radius: 16px; overflow: hidden;
    }
    /* 날씨 반쪽 */
    .wb-half {
      flex: 1; padding: 9px 12px;
      display: flex; flex-direction: column; justify-content: center; gap: 2px;
    }
    .wb-top { display: flex; align-items: center; gap: 6px; }
    .wb-icon { font-size: 22px; line-height: 1; }
    .wb-temp { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .wb-desc { font-size: 15px; font-weight: 700; color: var(--sec); }
    .wb-sub  { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.55); }
    .wb-rain { font-size: 13px; font-weight: 700; color: #60a5fa; margin-top: 1px; }

    /* 강수 우산 예보 */
    .rain-forecast {
      flex-shrink: 0;
      display: flex; justify-content: space-around; align-items: flex-end;
      margin: 6px 20px 0;
      background: var(--surf); border: 1px solid var(--bord);
      border-radius: 14px;
      padding: 7px 6px 6px;
    }
    .rain-slot {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      flex: 1;
    }
    .rain-umb { line-height: 1; }
    .rain-pct {
      font-size: 10px; font-weight: 800;
      font-variant-numeric: tabular-nums;
    }
    .rain-pct.low  { color: rgba(255,255,255,.3); }
    .rain-pct.mid  { color: #60a5fa; }
    .rain-pct.high { color: #3b82f6; }
    .rain-pct.heavy{ color: #f87171; }
    .rain-label {
      font-size: 10px; font-weight: 600; color: var(--muted);
    }
    .rain-divider { width:1px; background:var(--bord); height:30px; margin-bottom:14px; }
    /* 구분선 */
    .wbb-div {
      width: 1px; background: var(--bord); margin: 8px 0;
    }
    /* 바이오리듬 반쪽 */
    .bio-half {
      flex: 1; padding: 9px 10px 9px 12px;
      display: flex; flex-direction: column; justify-content: center; gap: 3px;
    }
    .bio-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .bio-title {
      font-size: 13px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: rgba(129,140,248,.9);
    }
    .bio-msg { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.65); }
    .bio-rows { display: flex; flex-direction: column; gap: 4px; }
    .bio-row  { display: flex; align-items: center; gap: 5px; }
    .bio-label {
      width: 28px; font-size: 12px; font-weight: 700; color: rgba(255,255,255,.65);
      flex-shrink: 0; text-align: right;
    }
    .bio-track {
      flex: 1; height: 4px;
      background: rgba(255,255,255,.07);
      border-radius: 100px; overflow: visible;
      position: relative;
    }
    .bio-track::after {
      content: '';
      position: absolute; top: -2px; bottom: -2px;
      left: 50%; width: 1px;
      background: rgba(255,255,255,.12);
    }
    .bio-fill {
      height: 100%; border-radius: 100px;
      position: absolute; top: 0;
      transition: width .6s, left .6s;
    }
    .bio-val {
      width: 40px; font-size: 12px; font-weight: 800;
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }

    /* ═══════════════════════════
       6. FORTUNE + QUOTE CARD
    ═══════════════════════════ */
    .fq-card {
      flex-shrink: 0;
      margin: 8px 20px 0;
      background: rgba(251,191,36,.06);
      border: 1px solid rgba(251,191,36,.18);
      border-radius: 16px;
      padding: 9px 14px;
      display: flex; flex-direction: column;
    }
    .fq-row {
      display: flex; align-items: flex-start; gap: 8px;
    }
    .fq-badge {
      font-size: 13px; font-weight: 700;
      letter-spacing: .05em;
      border-radius: 100px; padding: 3px 9px;
      flex-shrink: 0; margin-top: 1px;
    }
    .fq-badge.horoscope {
      background: rgba(251,191,36,.15);
      color: rgba(251,191,36,.9);
    }
    .fq-badge.quote {
      background: rgba(129,140,248,.15);
      color: rgba(129,140,248,.9);
    }
    .fq-text {
      font-size: 14px; font-weight: 700; color: rgba(255,255,255,.9);
      line-height: 1.5; word-break: keep-all; flex: 1;
    }
    .fq-divider {
      height: 1px; background: rgba(255,255,255,.06);
    }

    /* ═══════════════════════════
       7. D-DAY BAR
    ═══════════════════════════ */
    .dday-bar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
      margin: 8px 20px 0;
      overflow-x: auto; overflow-y: hidden;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }
    .dday-bar::-webkit-scrollbar { display: none; }
    .dday-chip {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 5px;
      background: var(--surf); border: 1px solid var(--bord);
      border-radius: 100px; padding: 5px 11px;
      white-space: nowrap;
    }
    .dday-chip.soon {
      background: rgba(251,191,36,.1);
      border-color: rgba(251,191,36,.3);
    }
    .dday-chip.today {
      background: rgba(48,209,88,.12);
      border-color: rgba(48,209,88,.35);
    }
    .dday-icon { font-size: 13px; line-height: 1; }
    .dday-name { font-size: 13px; color: rgba(255,255,255,.85); font-weight: 600; }
    .dday-num  {
      font-size: 13px; font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--a2);
    }
    .dday-chip.soon  .dday-num { color: rgba(251,191,36,.95); }
    .dday-chip.today .dday-num { color: var(--green); }

    /* ═══════════════════════════
       8. SCHEDULE LIST (세로)
    ═══════════════════════════ */
    .sched-section {
      flex: 1;
      display: flex; flex-direction: column;
      min-height: 0;
      margin: 10px 20px 0;
    }
    .sched-heading {
      flex-shrink: 0;
      font-size: 11px; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      color: rgba(255,255,255,.35);
      margin-bottom: 7px;
      text-align: center;
    }
    .sched-scroll {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      max-height: 136px;
    }
    .sched-scroll::-webkit-scrollbar { display: none; }

    .sched-list {
      display: flex; flex-direction: column; gap: 4px;
      padding-bottom: 4px;
    }

    .sched-item {
      display: flex; align-items: center; gap: 10px;
      border-radius: 12px;
      padding: 8px 12px;
      background: transparent;
      transition: background .2s, opacity .2s;
      opacity: 0.45;
      position: relative;
    }

    /* 현재 활성 아이템 */
    .sched-item.active {
      background: rgba(99,102,241,.15);
      border: 1px solid rgba(99,102,241,.3);
      opacity: 1;
    }
    /* 미래 아이템 */
    .sched-item.future {
      opacity: 0.7;
    }

    .si-time {
      font-size: 12px; font-weight: 500; color: rgba(255,255,255,.55);
      font-variant-numeric: tabular-nums;
      min-width: 36px; text-align: right;
      flex-shrink: 0;
    }
    .sched-item.active .si-time {
      color: var(--a2);
      font-weight: 600;
    }

    .si-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,.15);
      flex-shrink: 0;
    }
    .sched-item.active .si-dot {
      background: var(--acc);
      box-shadow: 0 0 6px var(--acc);
    }
    .sched-item.future .si-dot {
      background: rgba(255,255,255,.25);
    }

    .si-icon { font-size: 16px; flex-shrink: 0; }

    .si-name {
      font-size: 14px; font-weight: 600;
      color: rgba(255,255,255,.82);
      flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sched-item.active .si-name {
      color: #fff;
      font-weight: 700;
    }

    /* 현재 진행 중 뱃지 */
    .si-now {
      display: none;
      font-size: 9px; font-weight: 700;
      color: var(--a2);
      background: rgba(99,102,241,.2);
      border-radius: 100px; padding: 2px 7px;
      letter-spacing: .05em;
      flex-shrink: 0;
    }
    .sched-item.active .si-now { display: block; }

    /* ═══════════════════════════
       6. FIND MY BUTTON
    ═══════════════════════════ */
    .findmy-btn {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin: 8px 20px 0;
      background: rgba(48,209,88,.12);
      border: 1px solid rgba(48,209,88,.28);
      border-radius: 16px;
      padding: 14px 20px;
      text-decoration: none;
      color: var(--text);
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .findmy-btn:active {
      background: rgba(48,209,88,.22);
      transform: scale(0.97);
    }
    .findmy-icon { font-size: 24px; line-height: 1; flex-shrink: 0; }
    .findmy-body { flex: 1; }
    .findmy-title { font-size: 15px; font-weight: 700; color: #fff; }
    .findmy-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .findmy-arrow { font-size: 18px; color: rgba(48,209,88,.7); }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">YJ NOW</span>
    </div>
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-datetime" id="hero-datetime"><span id="hd-date">----.--.--</span> (<span id="hd-day">-</span>) <span class="hd-time" id="hd-time">--:--</span></div>
    <div class="hero-emoji" id="curr-icon">💤</div>
    <div class="hero-name"  id="curr-name">로딩 중</div>
    <div class="hero-since" id="curr-since">--:--</div>
    <div class="hero-prog">
      <div class="hp-meta">
        <span id="hp-from">-</span>
        <span id="hp-pct">0%</span>
        <span id="hp-to">-</span>
      </div>
      <div class="hp-track"><div class="hp-fill" id="hp-fill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- 강수 우산 예보 (날씨 위) -->
  <div class="rain-forecast" id="rain-forecast" style="display:none">
    <!-- JS로 렌더링 -->
  </div>

  <!-- WEATHER + BIORHYTHM 한 줄 -->
  <div class="wb-bio-wrap">
    <!-- 날씨 -->
    <div class="wb-half">
      <div class="wb-top">
        <span class="wb-icon" id="wb-icon">🌤</span>
        <span class="wb-temp" id="wb-temp">--°</span>
      </div>
      <div class="wb-desc" id="wb-desc">불러오는 중...</div>
      <div class="wb-sub">체감 <span id="wb-feels">--°</span> · 습도 <span id="wb-humid">--%</span></div>
      <div class="wb-rain" id="wb-rain" style="display:none"></div>
    </div>
    <div class="wbb-div"></div>
    <!-- 바이오리듬 -->
    <div class="bio-half">
      <div class="bio-top">
        <span class="bio-title">🌊 바이오리듬</span>
        <span class="bio-msg" id="bio-msg"></span>
      </div>
      <div class="bio-rows">
        <div class="bio-row">
          <span class="bio-label">신체</span>
          <div class="bio-track"><div class="bio-fill" id="bio-p-fill"></div></div>
          <span class="bio-val" id="bio-p-val"></span>
        </div>
        <div class="bio-row">
          <span class="bio-label">감성</span>
          <div class="bio-track"><div class="bio-fill" id="bio-e-fill"></div></div>
          <span class="bio-val" id="bio-e-val"></span>
        </div>
        <div class="bio-row">
          <span class="bio-label">지성</span>
          <div class="bio-track"><div class="bio-fill" id="bio-i-fill"></div></div>
          <span class="bio-val" id="bio-i-val"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- FORTUNE -->
  <div class="fq-card">
    <div class="fq-row">
      <span class="fq-badge horoscope">🔮 오늘의 운세</span>
      <span class="fq-text" id="fq-horoscope">불러오는 중...</span>
    </div>
  </div>

  <!-- D-DAY -->
  <div class="dday-bar" id="dday-bar"></div>

  <!-- SCHEDULE LIST -->
  <div class="sched-section">
    <div class="sched-heading">오늘의 일정</div>
    <div class="sched-scroll" id="sched-scroll">
      <div class="sched-list" id="sched-list"></div>
    </div>
  </div>

  <!-- FIND MY BUTTON -->
  <a class="findmy-btn" href="findmy://" onclick="return openFindMy(event)">
    <div class="findmy-icon">📍</div>
    <div class="findmy-body">
      <div class="findmy-title">YJ 위치 확인</div>
      <div class="findmy-sub">Find My 앱에서 현재 위치 열기</div>
    </div>
    <div class="findmy-arrow">›</div>
  </a>

</div>

<script>
/* ════════════════════════════════════════
   📋 GOOGLE SHEETS 연동
════════════════════════════════════════ */
const SHEET_ID  = '1iTXe5zRar4RgFAixNB7L_G6KPjFOohuvFBOO5S02ZhI';

let RAW = RAW_FALLBACK.slice();

function parseCSV(text) {
  return text.trim().split('\n')
    .slice(1)
    .map(line => {
      const cols = line.split(',').map(c => c.replace(/^"|"$/g, '').trim());
      if (cols.length >= 3 && cols[0] && cols[1] && cols[2]) {
        return `${cols[0]},${cols[1]},${cols[2]}`;
      }
      return null;
    })
    .filter(Boolean);
}

async function loadSheetData() {
  if (SHEET_ID === 'YOUR_SHEET_ID_HERE') return;
  try {
    const res  = await fetch(SHEET_URL + '&t=' + Date.now());
    const text = await res.text();
    const parsed = parseCSV(text);
    if (parsed.length > 0) {
      RAW = parsed;
      updateSched();
    }
  } catch (e) {
    console.warn('시트 로드 실패, 기본 데이터 사용:', e);
  }
}

function todayHoliday() {
  const now = new Date();
  const key = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  return holidayMap[key] || null;
}
// 교시 그룹핑 제거 — 시트에서 가져온 상세 이름 그대로 표시
function displayActivity(n) {
  return n || '';
}

function actIcon(n){
  if(!n) return '💤';
  if(n.includes('셔틀')||n.includes('등교')||n.includes('귀가')) return '🚌';
  if(n.match(/[1-7]교시/)||n.includes('수업')||n.includes('종례')||n.includes('자습')) {
    if(n.includes('자습')) return '🌙';
    if(n.includes('종례')) return '🧹';
    return '📚';
  }
  if(n.includes('중식')||n.includes('석식')) return '🍱';
  if(n.includes('청소')) return '🧹';
  if(n.includes('방과후')) return '📖';
  if(n.includes('수학')) return '🔢';
  if(n.includes('영어')) return '🌍';
  if(n.includes('국어')) return '📝';
  if(n.includes('과학')) return '🔬';
  if(n.includes('사회')||n.includes('역사')) return '🗺️';
  if(n.includes('체육')) return '⚽';
  if(n.includes('음악')) return '🎵';
  if(n.includes('미술')) return '🎨';
  if(n.includes('집')) return '🏠';
  return '📌';
}

/* ════════ SCHEDULE LIST ════════ */
let items = [];
let prevCurrIdx = -1;

function buildSchedList(currIdx) {
  const list = document.getElementById('sched-list');
  list.innerHTML = '';
  const nowMin = new Date().getHours()*60 + new Date().getMinutes();

  items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'sched-item';
    el.dataset.idx = i;

    if (i === currIdx) {
      el.classList.add('active');
    } else if (item.min > nowMin) {
      el.classList.add('future');
    }

    const dispName = displayActivity(item.activity);
    el.innerHTML =
      `<span class="si-time">${item.time}</span>` +
      `<span class="si-dot"></span>` +
      `<span class="si-icon">${actIcon(dispName)}</span>` +
      `<span class="si-name">${dispName}</span>` +
      `<span class="si-now">NOW</span>`;

    list.appendChild(el);
  });

  scrollToCurrent(currIdx);
}

function scrollToCurrent(currIdx) {
  if (currIdx < 0) return;
  const scroll = document.getElementById('sched-scroll');
  const list   = document.getElementById('sched-list');
  const activeEl = list.children[currIdx];
  if (!activeEl) return;

  // 현재 아이템이 스크롤 영역 중앙에 오도록
  const scrollTop = activeEl.offsetTop - scroll.clientHeight / 2 + activeEl.clientHeight / 2;
  scroll.scrollTo({ top: Math.max(0, scrollTop), behavior: 'smooth' });
}

function updateSchedList(currIdx) {
  const list = document.getElementById('sched-list');
  if (!list.children.length || items.length !== list.children.length) {
    buildSchedList(currIdx);
    return;
  }
  const nowMin = new Date().getHours()*60 + new Date().getMinutes();
  Array.from(list.children).forEach((el, i) => {
    el.className = 'sched-item';
    if (i === currIdx) el.classList.add('active');
    else if (items[i] && items[i].min > nowMin) el.classList.add('future');
  });
  if (currIdx !== prevCurrIdx) {
    scrollToCurrent(currIdx);
    prevCurrIdx = currIdx;
  }
}

/* ════════ SCHEDULE ════════ */
function updateSched(){
  const now     = new Date();
  const dayName = DAYS[now.getDay()];
  const nowMin  = now.getHours()*60+now.getMinutes();

  // 공휴일 체크
  const holiday = todayHoliday();
  if (holiday) {
    document.getElementById('curr-icon').textContent  = '🎌';
    document.getElementById('curr-name').textContent  = holiday;
    document.getElementById('curr-since').textContent = '공휴일';
    document.getElementById('hp-from').textContent    = '-';
    document.getElementById('hp-to').textContent      = '-';
    document.getElementById('hp-pct').textContent     = '-';
    document.getElementById('hp-fill').style.width    = '0%';
    // 일정 리스트에 공휴일 메시지
    const list = document.getElementById('sched-list');
    list.innerHTML = `
      <div style="text-align:center; padding:28px 0; color:rgba(255,255,255,.3); font-size:13px;">
        🎌 ${holiday}<br>
        <span style="font-size:11px; margin-top:4px; display:block;">오늘은 학교 일정이 없어요</span>
      </div>`;
    items = [];
    return;
  }
  const fresh   = RAW.filter(r=>r.endsWith(dayName)).map(r=>{
    const [t,a]=r.split(','); return{time:t,activity:a,min:toMin(t)};
  });

  const rebuild = fresh.length !== items.length ||
    fresh.some((it,i)=>items[i]&&it.activity!==items[i].activity);
  items = fresh;

  let ci=-1;
  for(let i=0;i<items.length;i++) if(nowMin>=items[i].min) ci=i;
  const curr = ci>=0 ? items[ci] : null;
  const next = ci<items.length-1 ? items[ci+1] : null;

  // Hero 업데이트
  const currDisp = curr ? displayActivity(curr.activity) : null;
  document.getElementById('curr-icon').textContent  = actIcon(currDisp);
  document.getElementById('curr-name').textContent  = currDisp || '일정 없음';
  document.getElementById('curr-since').textContent = curr ? curr.time+' 시작' : '--:--';

  let pct=0;
  if(curr&&next){ const tot=next.min-curr.min; if(tot>0) pct=Math.min(100,Math.round((nowMin-curr.min)/tot*100)); }
  document.getElementById('hp-from').textContent = curr?curr.time:'-';
  document.getElementById('hp-to').textContent   = next?'▶ '+next.time:'-';
  document.getElementById('hp-pct').textContent  = pct+'%';
  document.getElementById('hp-fill').style.width = pct+'%';

  // 리스트 업데이트
  if (rebuild) {
    buildSchedList(Math.max(0,ci));
    prevCurrIdx = ci;
  } else {
    updateSchedList(Math.max(0,ci));
  }
}

/* ════════ CLOCK ════════ */
function updateClock(){
  const now = new Date();
  const y   = now.getFullYear();
  const mo  = now.getMonth()+1;
  const d   = now.getDate();
  const h   = pad(now.getHours());
  const m   = pad(now.getMinutes());
  document.getElementById('hd-date').textContent = `${y}.${mo}.${d}`;
  document.getElementById('hd-day').textContent  = DAY_S[now.getDay()];
  document.getElementById('hd-time').textContent = `${h}:${m}`;
}

const WI = ['☀️','🌤️','⛅','☁️','🌫️','🌦️','🌧️','❄️','🌨️','⛈️'];
const WD = ['맑음','대체로 맑음','구름 조금','흐림','안개','이슬비','비','눈','눈 소나기','뇌우'];
function wi(c){ return c===0?0:c<=2?1:c===3?3:c<=49?4:c<=57?5:c<=65?6:c<=77?7:c<=86?8:9; }

function umbrellaClipColor(prob) {
  if (prob < 20)  return 'rgba(96,165,250,0.25)';
  if (prob < 40)  return 'rgba(96,165,250,0.55)';
  if (prob < 70)  return '#3b82f6';
  return '#f87171';
}
function umbrellaHandleColor(prob) {
  return prob < 20 ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.55)';
}
function pctClass(prob) {
  if (prob < 20)  return 'low';
  if (prob < 50)  return 'mid';
  if (prob < 80)  return 'high';
  return 'heavy';
}

function renderUmbrellaSlot(prob, label, id) {
  const fillH = Math.round(prob / 100 * 32); // 최대 채움 높이 32px (dome 영역)
  const fillY = 32 - fillH;
  const fill  = umbrellaClipColor(prob);
  const stroke= umbrellaHandleColor(prob);
  const cls   = pctClass(prob);
  return `<div class="rain-slot">
    <div class="rain-umb">
      <svg viewBox="0 0 40 52" width="21" height="25" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="uc${id}">
            <rect x="0" y="${fillY}" width="40" height="${fillH}"/>
          </clipPath>
        </defs>
        <path d="M20 4 A16 16 0 0 1 36 20 L4 20 A16 16 0 0 1 20 4 Z" fill="${fill}" clip-path="url(#uc${id})"/>
        <path d="M20 4 A16 16 0 0 1 36 20 L4 20 A16 16 0 0 1 20 4 Z" fill="none" stroke="${stroke}" stroke-width="1.8"/>
        <line x1="20" y1="20" x2="20" y2="40" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M20 40 Q20 48 15 48 Q10 48 10 42" fill="none" stroke="${stroke}" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="rain-pct ${cls}">${prob}%</div>
    <div class="rain-label">${label}</div>
  </div>`;
}

async function fetchWeather(){
  try{
    const d=await(await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=37.3595&longitude=127.1052'+
      '&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code'+
      '&hourly=precipitation_probability'+
      '&daily=precipitation_sum'+
      '&timezone=Asia%2FSeoul&forecast_days=1'
    )).json(), c=d.current, x=wi(c.weather_code);
    document.getElementById('wb-icon').textContent  = WI[x];
    document.getElementById('wb-temp').textContent  = Math.round(c.temperature_2m)+'°';
    document.getElementById('wb-desc').textContent  = WD[x];
    document.getElementById('wb-feels').textContent = Math.round(c.apparent_temperature)+'°';
    document.getElementById('wb-humid').textContent = c.relative_humidity_2m+'%';

    // 기존 wb-rain 숨김 (우산으로 대체)
    const rainEl = document.getElementById('wb-rain');
    if (rainEl) rainEl.style.display = 'none';

    // 시간별 강수확률 — 우산 그래픽
    const hourProbs = d.hourly?.precipitation_probability || [];
    const nowH = new Date().getHours();
    const rainBox = document.getElementById('rain-forecast');
    if (hourProbs.length && rainBox) {
      const offsets = [0, 2, 4, 6];
      const labels  = ['지금', '+2시간', '+4시간', '+6시간'];
      let html = '';
      offsets.forEach((off, i) => {
        const h = nowH + off;
        const prob = h < hourProbs.length ? (hourProbs[h] ?? 0) : 0;
        if (i > 0) html += '<div class="rain-divider"></div>';
        html += renderUmbrellaSlot(prob, labels[i], i);
      });
      rainBox.innerHTML = html;
      rainBox.style.display = 'flex';
    }
  }catch{ document.getElementById('wb-desc').textContent='날씨 정보 없음'; }
}

/* ════════ BIORHYTHM ════════ */
const BIRTH = new Date(2010, 2, 8); // 2010-03-08

function calcBiorhythm() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const days = Math.floor((today - BIRTH) / 86400000);

  const P = Math.sin(2 * Math.PI * days / 23); // 신체
  const E = Math.sin(2 * Math.PI * days / 28); // 감성
  const I = Math.sin(2 * Math.PI * days / 33); // 지성

  // -1~1 → 퍼센트 표시
  const pPct = Math.round(P * 100);
  const ePct = Math.round(E * 100);
  const iPct = Math.round(I * 100);

  // 바 렌더링: 중앙(50%)에서 좌우로
  function renderBar(fillId, valId, val, color) {
    const fill = document.getElementById(fillId);
    const valEl = document.getElementById(valId);
    const pct = val / 100; // -1 ~ 1
    const barLeft  = pct >= 0 ? 50 : 50 + pct * 50;
    const barWidth = Math.abs(pct) * 50;
    fill.style.left       = barLeft + '%';
    fill.style.width      = barWidth + '%';
    fill.style.background = color;
    valEl.textContent = (val > 0 ? '+' : '') + val + '%';
    valEl.style.color = color;
  }

  const colorP = P >= 0 ? '#34d399' : '#f87171'; // 신체: 초록/빨강
  const colorE = E >= 0 ? '#f472b6' : '#a78bfa'; // 감성: 핑크/보라
  const colorI = I >= 0 ? '#60a5fa' : '#fb923c'; // 지성: 파랑/주황

  renderBar('bio-p-fill', 'bio-p-val', pPct, colorP);
  renderBar('bio-e-fill', 'bio-e-val', ePct, colorE);
  renderBar('bio-i-fill', 'bio-i-val', iPct, colorI);

  // 종합 메시지
  const avg = (P + E + I) / 3;
  let msg;
  if (avg > 0.6)       msg = '✨ 최상';
  else if (avg > 0.3)  msg = '😊 양호';
  else if (avg > 0)    msg = '🙂 평온';
  else if (avg > -0.3) msg = '😐 무난';
  else if (avg > -0.6) msg = '😴 피로';
  else                 msg = '🌙 충전 필요';

  // 위기일(±5% 이내) 체크
  const crisis = [P, E, I].filter(v => Math.abs(v) < 0.087).length;
  if (crisis > 0) msg += ' ⚠️';

  document.getElementById('bio-msg').textContent = msg;
}

/* ════════ D-DAY ════════ */
const DDAY_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=DDAY`;

// 폴백: 시트 로드 실패 시 빈 배열 (시트 데이터만 사용)
const DDAY_FALLBACK = [];

// 이름 기반 자동 이모지
function ddayIcon(name) {
  if (!name) return '📅';
  if (name.includes('시험') || name.includes('고사') || name.includes('학평') || name.includes('수능')) return '📝';
  if (name.includes('방학') || name.includes('휴가') || name.includes('여름') || name.includes('겨울')) return '🎉';
  if (name.includes('개학') || name.includes('입학') || name.includes('졸업')) return '🏫';
  if (name.includes('체육') || name.includes('운동') || name.includes('대회')) return '🏃';
  if (name.includes('방학식') || name.includes('종업')) return '🎊';
  if (name.includes('학회') || name.includes('컨퍼런스')) return '🧑‍💼';
  if (name.includes('결혼') || name.includes('기념일') || name.includes('생일')) return '🎂';
  if (name.includes('여행') || name.includes('캠프') || name.includes('수학여행')) return '✈️';
  if (name.includes('공연') || name.includes('콘서트') || name.includes('뮤지컬')) return '🎭';
  return '📅';
}

// 날짜 파싱 — 구글 시트 CSV는 다양한 형식으로 나올 수 있음
// 지원: "2026-3-21", "2026-03-21", "2026/3/21", "3/21/2026", "2026. 3. 21." 등
function parseDate(str) {
  if (!str) return null;
  str = str.trim().replace(/\.$/, '').replace(/\s/g, '');
  // YYYY-M-D 또는 YYYY/M/D
  let m = str.match(/^(\d{4})[-\/\.](\d{1,2})[-\/\.](\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);
  // M/D/YYYY
  m = str.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
  if (m) return new Date(+m[3], +m[1]-1, +m[2]);
  return new Date(str);
}

function parseDdayCSV(text) {
  return text.trim().split('\n').slice(1).map(line => {
    const cols = line.split(',').map(c => c.replace(/^"|"$/g, '').trim());
    if (cols.length >= 2 && cols[0] && cols[1]) {
      const icon = (cols[2] && cols[2].trim()) ? cols[2].trim() : ddayIcon(cols[1]);
      return { date: cols[0], name: cols[1], icon };
    }
    return null;
  }).filter(Boolean);
}

function renderDday(events) {
  const bar = document.getElementById('dday-bar');
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // 오늘 이후 이벤트만, 날짜순 정렬
  const upcoming = events
    .map(e => {
      const d = parseDate(e.date);
      if (!d || isNaN(d)) return null;
      d.setHours(0,0,0,0);
      const diff = Math.round((d - today) / 86400000);
      return { ...e, diff };
    })
    .filter(e => e && e.diff >= 0)
    .sort((a, b) => a.diff - b.diff)
    .slice(0, 5); // 최대 5개

  if (!upcoming.length) {
    bar.style.display = 'none';
    return;
  }

  bar.innerHTML = upcoming.map(e => {
    const cls = e.diff === 0 ? 'today' : e.diff <= 7 ? 'soon' : '';
    const label = e.diff === 0 ? 'D-DAY!' : `D-${e.diff}`;
    return `<div class="dday-chip ${cls}">
      <span class="dday-icon">${e.icon}</span>
      <span class="dday-name">${e.name}</span>
      <span class="dday-num">${label}</span>
    </div>`;
  }).join('');
}

async function loadDday() {
  try {
    const res  = await fetch(DDAY_URL + '&t=' + Date.now());
    const text = await res.text();
    const parsed = parseDdayCSV(text);
    renderDday(parsed.length ? parsed : DDAY_FALLBACK);
  } catch {
    renderDday(DDAY_FALLBACK);
  }
}
